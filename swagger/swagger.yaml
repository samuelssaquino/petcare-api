openapi: 3.0.3
info:
  title: petcare-api
  version: 1.0.0
  description: API Rest para cadastro e consulta de pets.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Verifica se a API esta ativa
      responses:
        '200':
          description: API ativa
  /api/users:
    post:
      summary: Registra um usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: Usuario criado
        '400':
          description: Dados invalidos
        '409':
          description: Email ja esta em uso
  /api/login:
    post:
      summary: Autentica um usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso
        '400':
          description: Dados invalidos
        '401':
          description: Credenciais invalidas
  /api/pets:
    post:
      summary: Cadastra um PET
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        '201':
          description: PET criado
        '400':
          description: Dados invalidos
        '401':
          description: Token ausente ou invalido
    get:
      summary: Apresenta os PETs do usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de PETs
        '401':
          description: Token ausente ou invalido
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: Samuel Aquino
        email:
          type: string
          format: email
          example: samuel@example.com
        password:
          type: string
          format: password
          example: StrongPassword123
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: samuel@example.com
        password:
          type: string
          format: password
          example: StrongPassword123
    CreatePetRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Thor
        species:
          type: string
          example: Dog
        breed:
          type: string
          example: Golden Retriever
        age:
          type: number
          example: 3
        weight:
          type: number
          example: 28.5
        notes:
          type: string
          example: Friendly and playful.
